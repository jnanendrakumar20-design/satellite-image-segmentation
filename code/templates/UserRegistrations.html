{% extends 'base.html' %}
{% load static %}

{% block contents %}
<style>
    :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.8);
        --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
        --shadow-strong: 0 12px 40px rgba(0, 0, 0, 0.2);
    }

    .register-container {
        max-width: 500px;
        margin: 2rem auto;
    }

    .register-header {
        text-align: center;
        margin-bottom: 2rem;
        animation: fadeInUp 1s ease-out;
    }

    .register-header h2 {
        font-size: 2.5rem;
        font-weight: 700;
        color: #FFA500; /* Preserving original orange color */
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        margin-bottom: 0.5rem;
    }

    .form-container {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: var(--shadow-strong);
        animation: slideInUp 0.8s ease-out;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        color: var(--text-primary);
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--accent-gradient);
        box-shadow: 0 0 0 0.2rem rgba(79, 172, 254, 0.25);
        outline: none;
    }

    textarea.form-control {
        resize: none;
        min-height: 100px;
    }

    .btn-primary {
        background: var(--accent-gradient);
        color: var(--text-primary);
        padding: 0.75rem;
        border-radius: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border: none;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-soft);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-strong);
        background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
    }

    .alert-success {
        background: rgba(40, 167, 69, 0.2);
        color: #28a745;
        border: 1px solid #28a745;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        text-align: center;
        animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .register-container {
            margin: 1rem;
            padding: 1.5rem;
        }

        .register-header h2 {
            font-size: 2rem;
        }
    }
</style>

<div class="register-container">
    <div class="register-header">
        <h2>Register Here</h2>
    </div>

    <div class="form-container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form action="{% url 'UserRegisterForm' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" class="form-control" id="name" name="name" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="loginid">Login ID:</label>
                <input type="text" class="form-control" id="loginid" name="loginid" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" class="form-control" id="password" name="password" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="mobile">Mobile:</label>
                <input type="text" class="form-control" id="mobile" name="mobile" maxlength="10" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" name="email" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="locality">Locality:</label>
                <input type="text" class="form-control" id="locality" name="locality" maxlength="100">
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <textarea class="form-control" id="address" name="address" maxlength="1000" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" class="form-control" id="city" name="city" maxlength="100">
            </div>
            <div class="form-group">
                <label for="state">State:</label>
                <input type="text" class="form-control" id="state" name="state" maxlength="100">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</div>
{% endblock %}
