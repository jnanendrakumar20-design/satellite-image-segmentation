{% extends 'base.html' %}
{% load static %}
{% block contents %}
<style>
    .login-section {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        padding: 2rem 1rem;
    }

    .login-container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 
            0 20px 60px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        position: relative;
        overflow: hidden;
        animation: slideInUp 0.8s ease-out;
    }

    .login-container::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.1), transparent);
        animation: rotate 4s linear infinite;
        z-index: -1;
    }

    @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .login-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .login-title {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF6B35 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 0.5rem;
        position: relative;
    }

    .login-subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1rem;
        font-weight: 300;
    }

    .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }

    .form-control {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        color: white;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
    }

    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.5);
        font-weight: 300;
    }

    .form-control:focus {
        outline: none;
        border-color: #4facfe;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 
            0 0 0 3px rgba(79, 172, 254, 0.2),
            0 8px 25px rgba(79, 172, 254, 0.1);
        transform: translateY(-2px);
    }

    .input-icon {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.1rem;
        pointer-events: none;
    }

    .btn-login {
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        border: none;
        border-radius: 12px;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        margin-top: 1rem;
    }

    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        transition: left 0.3s ease;
        z-index: -1;
    }

    .btn-login:hover::before {
        left: 0;
    }

    .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(79, 172, 254, 0.4);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .alert {
        background: rgba(40, 167, 69, 0.2);
        border: 1px solid rgba(40, 167, 69, 0.3);
        border-radius: 12px;
        color: #d4edda;
        padding: 1rem;
        margin-top: 1rem;
        text-align: center;
        backdrop-filter: blur(10px);
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .forgot-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }

    .forgot-link:hover {
        color: #4facfe;
        text-decoration: underline;
    }

    .register-prompt {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
    }

    .register-link {
        color: #4facfe;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .register-link:hover {
        color: #00f2fe;
        text-decoration: underline;
    }

    @media (max-width: 768px) {
        .login-container {
            margin: 1rem;
            padding: 2rem;
        }
        
        .login-title {
            font-size: 2rem;
            letter-spacing: 1px;
        }
    }
</style>

<div class="login-section">
    <div class="login-container">
        <div class="login-header">
            <h2 class="login-title">User Login</h2>
            <p class="login-subtitle">Welcome back! Please sign in to continue</p>
        </div>
        
        <form action="{% url 'UserLoginCheck' %}" method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="text" class="form-control" name="loginid" required placeholder="Enter Login ID">
                <i class="fas fa-user input-icon"></i>
            </div>
            
            <div class="form-group">
                <input type="password" class="form-control" name="pswd" required placeholder="Enter Password">
                <i class="fas fa-lock input-icon"></i>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>
                Login
            </button>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert">
                        <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        </form>
        
        <a href="#" class="forgot-link">Forgot your password?</a>
        
        <div class="register-prompt">
            Don't have an account? 
            <a href="{% url 'UserRegisterForm' %}" class="register-link">Create Account</a>
        </div>
    </div>
</div>

{% endblock %}
